<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <link href="/api/cms-config" type="text/yaml" rel="cms-config-url" />
</head>
<body>
  <div style="background:#0d0f17;color:#fff;padding:10px 16px;font-family:system-ui,sans-serif;font-size:14px;display:flex;align-items:center;justify-content:space-between;">
    <span>Content Manager</span>
    <a href="https://vercel.com/craciunpv-archs-projects/job-postings/analytics" target="_blank" rel="noopener" style="color:#fff;text-decoration:underline;">View Analytics →</a>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    var TeamPreview = createClass({
      render: function () {
        var entry = this.props.entry;
        var name = entry.getIn(['data', 'name']) || '';
        var zoom = entry.getIn(['data', 'photoZoom']);
        var posX = entry.getIn(['data', 'photoPositionX']);
        var posY = entry.getIn(['data', 'photoPositionY']);
        zoom = (zoom === undefined || zoom === null || zoom === '') ? 100 : zoom;
        posX = (posX === undefined || posX === null || posX === '') ? 50 : posX;
        posY = (posY === undefined || posY === null || posY === '') ? 50 : posY;
        var photoPath = entry.getIn(['data', 'photo']);
        var asset = photoPath ? this.props.getAsset(photoPath) : null;
        var photoUrl = asset ? asset.toString() : null;

        return h('div', { style: { padding: '32px', fontFamily: 'sans-serif' } },
          h('div', {
            style: {
              width: '160px',
              height: '160px',
              borderRadius: '50%',
              overflow: 'hidden',
              background: '#e3d6c4',
              border: '1px solid #e3d6c4',
            }
          },
            photoUrl ? h('img', {
              src: photoUrl,
              style: {
                width: zoom + '%',
                height: zoom + '%',
                objectFit: 'cover',
                marginLeft: (-1 * (zoom - 100) * (posX / 100)) + '%',
                marginTop: (-1 * (zoom - 100) * (posY / 100)) + '%',
              }
            }) : null
          ),
          h('p', { style: { marginTop: '14px', fontWeight: 'bold', fontSize: '16px', color: '#2b2420' } }, name),
          h('p', { style: { fontSize: '13px', color: '#837567', maxWidth: '260px' } }, 'This is how their avatar will look on job cards and job pages. Adjust Photo Zoom/Position above until their face is centered here.')
        );
      }
    });

    CMS.registerPreviewTemplate('team', TeamPreview);
  </script>
</body>
</html>
