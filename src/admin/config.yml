backend:
  name: github
  repo: craciunpv-arch/job-postings
  branch: main
  base_url: https://hand-picked-jobs.edurom.ro
  auth_endpoint: api/auth

local_backend: true

publish_mode: editorial_workflow

media_folder: "src/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: jobs
    label: "Job Postings"
    folder: src/jobs
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Role Title", name: title, widget: string }
      - { label: "Monthly Net Salary", name: salary, widget: string }
      - { label: City, name: city, widget: string }
      - label: "Working Type"
        name: workingType
        widget: select
        options: ["Remote", "Hybrid", "Onsite"]
      - label: Status
        name: status
        widget: select
        options: ["Open", "Closed"]
        default: "Open"
      - label: "Posted By"
        name: recruiter
        widget: relation
        collection: team
        search_fields: ["name"]
        display_fields: ["name"]
        value_field: "{{slug}}"
        required: false
        hint: "Teammate who's the point of contact for this role. Leave blank to use the default contact in Site Settings."
      - { label: "Publish Date", name: date, widget: datetime }
      - { label: "Client Teaser", name: clientTeaser, widget: string, required: false, hint: "One line shown on the listing, e.g. 'Series A fintech in Iași'" }
      - { label: "Tech Stack", name: techStack, widget: list, required: false, hint: "Tags shown on the listing, e.g. Java, React, PostgreSQL" }
      - { label: "Client Description", name: clientDescription, widget: markdown }
      - { label: "Main Responsibilities", name: responsibilities, widget: markdown }
      - { label: "Must-haves", name: mustHaves, widget: markdown }
      - { label: "Nice-to-haves", name: niceToHaves, widget: markdown }
      - { label: "Other Benefits", name: benefits, widget: markdown }
      - { label: "Selection Process", name: selectionProcess, widget: markdown }
      - { label: "Good to Know", name: goodToKnow, widget: markdown }

  - name: team
    label: "Team Members"
    folder: src/team
    create: true
    slug: "{{slug}}"
    identifier_field: name
    fields:
      - { label: "Full Name", name: name, widget: string }
      - { label: "Role / Title", name: role, widget: string, required: false, hint: "e.g. Talent Sourcer, Tech Recruiter" }
      - { label: "Photo", name: photo, widget: image }
      - { label: "Photo Zoom (%)", name: photoZoom, widget: number, default: 100, hint: "Use the preview on the right to check. Increase to zoom in closer on their face (100% = no zoom)." }
      - { label: "Photo Position X (%)", name: photoPositionX, widget: number, default: 50, hint: "0 = far left of the photo, 100 = far right, 50 = centered. Adjust until their face is centered horizontally in the preview." }
      - { label: "Photo Position Y (%)", name: photoPositionY, widget: number, default: 50, hint: "0 = top of the photo, 100 = bottom, 50 = centered. Adjust until their face is centered vertically in the preview." }
      - { label: "LinkedIn URL", name: linkedin, widget: string }
      - { label: "Email", name: email, widget: string }

  - name: settings
    label: "Site Settings"
    files:
      - file: src/_data/site.json
        name: site
        label: "General Settings"
        fields:
          - { label: "Site Title", name: siteTitle, widget: string, hint: "Shown in the header next to the Edurom logo." }
          - { label: "Homepage Tagline", name: tagline, widget: text, hint: "Short, team-neutral line shown above the job list." }
          - { label: "Default Contact LinkedIn URL", name: linkedin, widget: string, hint: "Used on the homepage and on any job that has no 'Posted By' teammate set." }
          - { label: "Default Contact Email", name: email, widget: string }
          - { label: "Social Preview Image", name: ogImage, widget: image, required: false, hint: "Shown when a job link is shared on LinkedIn/Twitter/etc." }
          - { label: "Contact Note", name: contactNote, widget: text }
          - { label: "Footer Text", name: footerText, widget: string, hint: "Shown at the bottom of every page, e.g. '© An Edurom Recruitment Project'." }
          - { label: "Footer Font Size (px)", name: footerFontSize, widget: number, default: 13 }
          - { label: "Footer Bold", name: footerBold, widget: boolean, default: false }
          - { label: "Footer Italic", name: footerItalic, widget: boolean, default: false }
          - { label: "Footer Sub-text", name: footerSubtext, widget: text, required: false, hint: "A short company description shown below the footer text, in smaller italic type." }

      - file: src/_data/cmsFieldLabels.json
        name: cmsFieldLabels
        label: "CMS Field Labels"
        hint: "Renames the field labels shown when editing Job Postings and Team Members. Refresh the CMS after saving to see the new labels."
        fields:
          - { label: "Job: Role Title", name: "jobs.title", widget: string }
          - { label: "Job: Monthly Net Salary", name: "jobs.salary", widget: string }
          - { label: "Job: City", name: "jobs.city", widget: string }
          - { label: "Job: Working Type", name: "jobs.workingType", widget: string }
          - { label: "Job: Status", name: "jobs.status", widget: string }
          - { label: "Job: Posted By", name: "jobs.recruiter", widget: string }
          - { label: "Job: Publish Date", name: "jobs.date", widget: string }
          - { label: "Job: Client Teaser", name: "jobs.clientTeaser", widget: string }
          - { label: "Job: Tech Stack", name: "jobs.techStack", widget: string }
          - { label: "Job: Client Description", name: "jobs.clientDescription", widget: string }
          - { label: "Job: Main Responsibilities", name: "jobs.responsibilities", widget: string }
          - { label: "Job: Must-haves", name: "jobs.mustHaves", widget: string }
          - { label: "Job: Nice-to-haves", name: "jobs.niceToHaves", widget: string }
          - { label: "Job: Other Benefits", name: "jobs.benefits", widget: string }
          - { label: "Job: Selection Process", name: "jobs.selectionProcess", widget: string }
          - { label: "Job: Good to Know", name: "jobs.goodToKnow", widget: string }
          - { label: "Team: Full Name", name: "team.name", widget: string }
          - { label: "Team: Role / Title", name: "team.role", widget: string }
          - { label: "Team: Photo", name: "team.photo", widget: string }
          - { label: "Team: Photo Zoom (%)", name: "team.photoZoom", widget: string }
          - { label: "Team: Photo Position X (%)", name: "team.photoPositionX", widget: string }
          - { label: "Team: Photo Position Y (%)", name: "team.photoPositionY", widget: string }
          - { label: "Team: LinkedIn URL", name: "team.linkedin", widget: string }
          - { label: "Team: Email", name: "team.email", widget: string }
